<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProShot Studio — AI Headshot Suite</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
    rel="stylesheet"
  >
  <style>
    /* ── Design Tokens (CSS Custom Properties) ──────────────────────────── */
    :root {
      /* Palette */
      --ps-bg:       #0b0d0f;
      --ps-surface:  #13161a;
      --ps-panel:    #1a1e24;
      --ps-border:   #252a32;
      --ps-border2:  #2e3440;
      --ps-text:     #e8eaf0;
      --ps-muted:    #6b7280;

      /* Brand */
      --ps-accent:   #22d3c8;
      --ps-accent2:  #0e9e95;
      --ps-amber:    #f59e0b;
      --ps-green:    #22c55e;
      --ps-red:      #ef4444;

      /* Geometry */
      --ps-radius:   6px;

      /* Typography */
      --ps-font-body:    'Plus Jakarta Sans', sans-serif;
      --ps-font-display: 'Syne', sans-serif;
    }

    /* ── Global Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; overflow-y: auto; }
    body {
      font-family: var(--ps-font-body);
      background: var(--ps-bg);
      color: var(--ps-text);
    }

    /* Loader overlay attribute selector for Lit's reflected boolean */
    ps-loader-overlay[visible] { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
